sonar.projectKey=AnyNoteInc_AnyNote
sonar.organization=anynoteinc

# Exclude files where "secret-looking" strings are placeholders, not real
# secrets. These are templates, examples, or env-substitution skeletons —
# all real secrets live in GitHub repository secrets.
sonar.exclusions=\
  deploy/.env.template,\
  deploy/.env.example,\
  .env.example,\
  docs/superpowers/specs/**,\
  docs/superpowers/plans/**

# CI workflow YAML legitimately references many ${{ secrets.* }} entries —
# that pattern is the *correct* way to handle secrets in GH Actions, not a
# vulnerability. Skip security-hotspot scanning for workflow files.
sonar.security.exclusions=\
  .github/workflows/**

# Don't double-count copy-pasted snippets in design specs / plans.
sonar.cpd.exclusions=\
  docs/**

sonar.sources=apps,packages
sonar.tests=apps,packages
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/test_*.py,**/tests/**
