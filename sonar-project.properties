sonar.projectKey=AnyNoteInc_AnyNote
sonar.organization=anynoteinc

# Exclude files where "secret-looking" strings are placeholders, not real
# secrets. These are templates, examples, or env-substitution skeletons —
# all real secrets live in GitHub repository secrets.
sonar.exclusions=\
  deploy/.env.template,\
  deploy/.env.example,\
  .env.example,\
  docs/superpowers/specs/**,\
  docs/superpowers/plans/**

# Per-rule hotspot suppressions:
#  - docker:S6504 on apps/web/Dockerfile: COPY --chown for node_modules /
#    packages/db pulls in pnpm trees with mixed file types (executables in
#    .bin/, libraries, JSON). A single --chmod can't satisfy all of them
#    without breaking binaries; the directories are owned by an unprivileged
#    `nextjs` user and never written at runtime.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=docker:S6504
sonar.issue.ignore.multicriteria.e1.resourceKey=apps/web/Dockerfile

# Don't double-count copy-pasted snippets in design specs / plans, and
# don't flag the boilerplate-by-design test scaffolding as duplication —
# tests intentionally repeat setup so each case reads end-to-end.
sonar.cpd.exclusions=\
  docs/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/test/**,\
  **/tests/**

sonar.sources=apps,packages
sonar.tests=apps,packages
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/test_*.py,**/tests/**
