name: Desktop

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Builds the Electron thin-client installers for all three desktop platforms on
# each release tag and pushes them into the (internal-only) MinIO bucket under
# `desktop/`, where the web app's /api/download/[os] route streams them to
# anonymous visitors. The repo and its GitHub Releases are private, so we do NOT
# publish release assets — visitors could not download them. MinIO has no public
# port/route, so CI can't reach it directly either: the `build` matrix uploads
# each installer as a workflow artifact, and the `publish` job SSHes to the
# deploy host (reusing the Deploy SSH plumbing) and `mc cp`s them into MinIO via
# a one-off container on the compose network.
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: dist:mac
            asset: AnyNote.dmg
          - os: windows-latest
            target: dist:win
            asset: AnyNote-Setup.exe
          - os: ubuntu-latest
            target: dist:linux
            asset: AnyNote.AppImage
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop installer
        # electron-builder writes installers to apps/desktop/release/ (output
        # dir + publish:null in apps/desktop/electron-builder.yml).
        run: pnpm --filter desktop run ${{ matrix.target }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.asset }}
          path: apps/desktop/release/${{ matrix.asset }}
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
      S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: installers
          pattern: installer-*
          merge-multiple: true

      - name: Setup SSH
        # Pinned to commit SHA (matches deploy.yml) for supply-chain safety.
        uses: webfactory/ssh-agent@a6f90b1f127823b31d4d4a8d96047790581349bd
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY_PRIVATE }}

      - name: Trust deploy host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Push installers into MinIO
        # MinIO is internal-only (no public port/route). scp the installers to
        # the host, then run a one-off minio/mc container on the compose default
        # network (anynote_default) — same alias pattern as the minio-init
        # service — to copy them into the bucket under desktop/.
        run: |
          set -e
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p /opt/anynote/desktop-upload"
          scp -P "$DEPLOY_PORT" \
            installers/AnyNote.dmg \
            installers/AnyNote-Setup.exe \
            installers/AnyNote.AppImage \
            "$DEPLOY_USER@$DEPLOY_HOST:/opt/anynote/desktop-upload/"
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -e; cd /opt/anynote; \
             docker run --rm --network anynote_default \
               -v /opt/anynote/desktop-upload:/data:ro \
               --entrypoint /bin/sh minio/mc -c \
               'mc alias set local http://minio:9000 \"$S3_ACCESS_KEY\" \"$S3_SECRET_KEY\" && \
                mc cp /data/AnyNote.dmg local/$S3_BUCKET/desktop/AnyNote.dmg && \
                mc cp /data/AnyNote-Setup.exe local/$S3_BUCKET/desktop/AnyNote-Setup.exe && \
                mc cp /data/AnyNote.AppImage local/$S3_BUCKET/desktop/AnyNote.AppImage'; \
             rm -rf /opt/anynote/desktop-upload"
