name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: anynote
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U user -d anynote"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      qdrant:
        image: qdrant/qdrant:v1.12.4
        ports: ['6333:6333']

      # Bitnami runs `minio server` by default and auto-creates buckets from
      # MINIO_DEFAULT_BUCKETS. The official minio/minio image needs
      # `server /data` as a command, which GHA services don't allow overriding.
      # Bitnami moved free images to `bitnamilegacy/` in Aug 2025; `bitnami/minio`
      # no longer publishes new tags.
      minio:
        image: bitnamilegacy/minio:latest
        env:
          MINIO_ROOT_USER: admin
          MINIO_ROOT_PASSWORD: password
          MINIO_DEFAULT_BUCKETS: storage
        ports: ['9000:9000']
        options: >-
          --health-cmd "curl -fsS http://localhost:9000/minio/health/live || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 24

    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/anynote
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
      BETTER_AUTH_URL: http://localhost:3000
      BETTER_AUTH_SECRET: ci-secret-not-real-32-chars-padding
      BETTER_AUTH_JWT_AUDIENCE: anynote-yjs
      # Deterministic test key (base64 of 32 bytes). Tests that encrypt/decrypt
      # workspace secrets (telegram webhook, AI providers) need this; CI has no
      # root .env for test/setup.ts to read, so it must come from this env block.
      SECRETS_ENCRYPTION_KEY: YW55bm90ZS1jaS10ZXN0LWVuY3J5cHRpb24ta2V5MzI=
      NEXT_PUBLIC_YJS_URL: ws://localhost:1234
      YJS_PORT: '1234'
      S3_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: admin
      S3_SECRET_KEY: password
      S3_BUCKET: storage
      S3_FORCE_PATH_STYLE: 'true'
      QDRANT__HOST: http://localhost:6333
      QDRANT__AUTH__TYPE: bearer_token
      QDRANT__AUTH__BEARER_TOKEN: dev-qdrant-key
      AGENTS_SERVICE_URL: http://localhost:8080
      AGENTS_SERVICE_TOKEN: ci-agents-token
      AGENTS_LOG_LEVEL: INFO
      ENGINES_PORT: '8082'
      ENGINES_SERVICE_URL: http://localhost:8082
      ENGINES_MCP_TOKEN: ci-engines-token
      ENGINES_MCP_URL: http://localhost:8082/api/mcp
      ANYNOTE_MCP_URL: http://localhost:8082/api/mcp
      INDEXER_CRON_EXPRESSION: '0 */5 * * * *'
      INDEXER_MAX_ATTEMPTS: '5'
      INDEXER_BATCH: '10'
      UPLOAD_INLINE_MAX_BYTES: '1048576'
      BILLING_RENEWAL_CRON_EXPRESSION: '0 0 * * *'
      BILLING_RENEWAL_BATCH_SIZE: '50'
      YOOKASSA_MOCK_ENABLED: 'true'
      NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ci-recaptcha-key
      RECAPTCHA_SECRET_KEY: ci-recaptcha-secret
      FORM_TOKEN_SECRET: ci-form-token-secret-at-least-32-bytes

    steps:
      - uses: actions/checkout@v5

      - name: Setup toolchain
        uses: ./.github/actions/setup

      - name: Apply Prisma schema
        run: pnpm --filter @repo/db exec prisma migrate deploy

      - name: Seed Prisma data
        run: pnpm --filter @repo/db exec prisma db seed

      - name: Install agents NLP models
        run: pnpm --filter agents run install:nlp-models

      - name: Type check
        run: pnpm check-types

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  release:
    needs: lint-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup toolchain
        uses: ./.github/actions/setup

      - name: Capture pre-release tag
        id: pre
        run: echo "tag=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)" >> "$GITHUB_OUTPUT"

      - name: Run semantic-release
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Capture post-release tag
        id: post
        run: echo "tag=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)" >> "$GITHUB_OUTPUT"

      # Dispatching Deploy via workflow_dispatch is the GitHub-sanctioned
      # exception to the rule that GITHUB_TOKEN-driven push events do not
      # trigger downstream workflows — without this, the tag pushed by
      # semantic-release wouldn't fire Deploy's `on.push.tags` listener.
      - name: Trigger Deploy on new tag
        if: steps.post.outputs.tag != '' && steps.post.outputs.tag != steps.pre.outputs.tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run Deploy --ref "${{ steps.post.outputs.tag }}"
