# Traefik static configuration. Loaded once at startup.
# Dynamic config (middlewares, basic-auth users) lives in dynamic/ and is
# hot-reloaded by Traefik on file change.
#
# ACME email is provided via the TRAEFIK_CERTIFICATESRESOLVERS_LE_ACME_EMAIL
# env var (set on the traefik service in compose.yml) — Traefik static YAML
# does not expand ${VAR} placeholders.

api:
  dashboard: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

providers:
  # File-only provider. We avoid the docker provider because Traefik 3.5's
  # bundled docker client uses API v1.24, which modern Docker daemons
  # (MinAPIVersion=1.40) reject before any negotiation can happen.
  # All routers/services for our containers are declared in dynamic/.
  file:
    directory: /etc/traefik/dynamic
    watch: true

certificatesResolvers:
  le:
    acme:
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web

log:
  level: INFO
accessLog: {}
