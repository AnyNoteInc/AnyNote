# Router/service definitions for the file provider. See traefik.yml for why
# we don't use the docker provider. Service URLs reference compose service
# names — they're resolvable on the default anynote network.

http:
  routers:
    # Public web app (Next.js)
    web:
      rule: "Host(`anynote.ru`) || Host(`www.anynote.ru`)"
      entryPoints:
        - websecure
      tls:
        certResolver: le
      service: web
      middlewares:
        - www-redirect@file
        - ratelimit@file
        - inflight@file
        - headers@file
        - compress@file

    # WebSocket / Hocuspocus (yjs)
    yjs:
      rule: "(Host(`anynote.ru`) || Host(`www.anynote.ru`)) && PathPrefix(`/ws`)"
      entryPoints:
        - websecure
      tls:
        certResolver: le
      service: yjs
      middlewares:
        - strip-ws@file
        - ratelimit-ws@file
        - inflight@file

    # Traefik dashboard (basic-auth)
    dashboard:
      rule: "Host(`traefik.anynote.ru`)"
      entryPoints:
        - websecure
      tls:
        certResolver: le
      service: api@internal
      middlewares:
        - dashboard-auth@file
        - ratelimit@file
        - headers@file

    # Portainer (Docker stack management UI). Auth handled by Portainer itself.
    portainer:
      rule: "Host(`portainer.anynote.ru`)"
      entryPoints:
        - websecure
      tls:
        certResolver: le
      service: portainer
      middlewares:
        - ratelimit@file
        - headers@file

    # Public anynote API (REST + MCP)
    api:
      rule: "Host(`api.anynote.ru`)"
      entryPoints:
        - websecure
      tls:
        certResolver: le
      service: engines
      middlewares:
        - ratelimit@file
        - inflight@file
        - headers@file
        - compress@file

  services:
    web:
      loadBalancer:
        servers:
          - url: "http://web:3000"
    yjs:
      loadBalancer:
        servers:
          - url: "http://yjs:1234"
    portainer:
      loadBalancer:
        servers:
          - url: "http://portainer:9000"
    engines:
      loadBalancer:
        servers:
          - url: "http://engines:8082"
