# Router/service definitions for the file provider. See traefik.yml for why
# we don't use the docker provider. Service URLs reference compose service
# names — they're resolvable on the default anynote network.

http:
  routers:
    # Public web app (Next.js)
    web:
      rule: "Host(`anynote.ru`) || Host(`www.anynote.ru`)"
      entryPoints:
        - websecure
      tls:
        certResolver: le
      service: web
      middlewares:
        - www-redirect@file
        - ratelimit@file
        - inflight@file
        - headers@file
        - compress@file

    # WebSocket / Hocuspocus (yjs)
    yjs:
      rule: "(Host(`anynote.ru`) || Host(`www.anynote.ru`)) && PathPrefix(`/ws`)"
      entryPoints:
        - websecure
      tls:
        certResolver: le
      service: yjs
      middlewares:
        - strip-ws@file
        - ratelimit-ws@file
        - inflight@file

    # Traefik dashboard (basic-auth)
    dashboard:
      rule: "Host(`traefik.anynote.ru`)"
      entryPoints:
        - websecure
      tls:
        certResolver: le
      service: api@internal
      middlewares:
        - dashboard-auth@file
        - ratelimit@file
        - headers@file

  services:
    web:
      loadBalancer:
        servers:
          - url: "http://web:3000"
    yjs:
      loadBalancer:
        servers:
          - url: "http://yjs:1234"
