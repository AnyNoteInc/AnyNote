services:
  traefik:
    image: traefik:v3.5
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik_acme:/letsencrypt
    environment:
      # Static traefik.yml does not interpolate env vars; we set ACME email
      # via Traefik's documented env-var override path instead.
      TRAEFIK_CERTIFICATESRESOLVERS_LE_ACME_EMAIL: ${ACME_EMAIL}

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: anynote
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: anynote
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anynote -d anynote"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY} &&
      mc mb --ignore-existing local/${S3_BUCKET}
      "
    restart: "no"

  qdrant:
    image: qdrant/qdrant:v1.12.4
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT__AUTH__BEARER_TOKEN}
      QDRANT__TELEMETRY_DISABLED: "true"
    volumes:
      - qdrant_data:/qdrant/storage

  migrate:
    image: ghcr.io/anynoteinc/anynote-web:latest
    restart: "no"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app/packages/db
    # pnpm keeps prisma + tsx in the package's own node_modules/.bin (not the
    # workspace root). `prisma db seed` spawns tsx, so it needs to be on PATH.
    command:
      - sh
      - -c
      - "export PATH=/app/packages/db/node_modules/.bin:$$PATH && prisma migrate deploy && prisma db seed"

  web:
    image: ghcr.io/anynoteinc/anynote-web:latest
    restart: unless-stopped
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      engines:
        condition: service_started
      agents:
        condition: service_started
    # Routing via traefik file provider in deploy/traefik/dynamic/routers.yml.

  yjs:
    image: ghcr.io/anynoteinc/anynote-yjs:latest
    restart: unless-stopped
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    # Routing via traefik file provider in deploy/traefik/dynamic/routers.yml.

  engines:
    image: ghcr.io/anynoteinc/anynote-engines:latest
    restart: unless-stopped
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy

  agents:
    image: ghcr.io/anynoteinc/anynote-agents:latest
    restart: unless-stopped
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      qdrant:
        condition: service_started

  portainer:
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    command: -H unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    # Routing via traefik file provider in deploy/traefik/dynamic/routers.yml.

volumes:
  postgres_data:
  minio_data:
  qdrant_data:
  traefik_acme:
  portainer_data:
