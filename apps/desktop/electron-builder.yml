appId: ru.anynote.desktop
productName: AnyNote
artifactName: '${productName}.${ext}'
directories:
  output: release
files:
  - dist/**
  - package.json
# No publish provider: installers are uploaded to S3 by the Desktop CI workflow
# (.github/workflows/desktop.yml), not published to GitHub Releases. Leaving a
# `provider: github` block here makes electron-builder attempt to publish on
# build and fail with "GH_TOKEN is not set". `publish: null` disables it.
# (Auto-update via electron-updater is a separate post-v1 follow-up; it would
# need its own generic/S3 feed config.)
publish: null
# The thin client has no native node modules (electron-store / electron-updater
# are pure JS), so skip @electron/rebuild — it's unnecessary and breaks on the
# monorepo's flat pnpm node_modules layout.
npmRebuild: false
mac:
  category: public.app-category.productivity
  target:
    - dmg
    - zip
  # We have no Apple Developer ID certificate. electron-builder would otherwise
  # SKIP signing (even `identity: "-"` only skips in v25 — it looks "-" up as a
  # keychain identity, finds none) leaving the linker's bare ad-hoc signature
  # with NO sealed bundle resources, which macOS reports as "приложение
  # повреждено" ("app is damaged") on launch — unfixable by the xattr workaround.
  # The custom sign hook applies a PROPER ad-hoc signature (sealed resources,
  # correct identifier) via codesign, turning the "damaged" dead-end into the
  # standard "unidentified developer" prompt that right-click→Open / `xattr -dr
  # com.apple.quarantine` resolve. NOT notarization — that's the post-v1 follow-up.
  sign: ./scripts/sign-mac-adhoc.cjs
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
win:
  target:
    - nsis
  artifactName: '${productName}-Setup.${ext}'
linux:
  target:
    - AppImage
    - deb
  category: Office
  # `deb` requires a maintainer (else build fails); AppImage uses it too.
  maintainer: AnyNote <support@anynote.ru>
